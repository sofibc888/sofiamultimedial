    <style>
        /* Estilos generales */
        body {
            background-color: #DFF2FE;

            margin: 0;
            min-height: 100vh;
            font-family: "Times New Roman", serif;
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            padding: 40px 0;
        }

        /* Contenedor de títulos */
        .contenedor {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 80px;
            margin: 0;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 35px;
            margin: 5px 0;
            font-weight: normal;
        }

        /* Estilo para las categorías (Acuarelas, etc.) */
        .categorias {
            font-family: "Apple Chancery", "ITC Zapf Chancery", "Zapf Chancery", cursive; /* Fuente elegante tipo manuscrita */
            font-style: italic;
            font-size: 24px;
            color: #4A607A;
            margin-top: 10px;
        }

        /* Imagen Principal Optimizada */
        .imagen-principal {
            display: block;
            margin: 40px auto;
            width: 450px; /* Tamaño grande */
            height: auto;
            border-radius: 15px;
            /* Eliminamos bordes blancos y añadimos sombra suave */
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            object-fit: cover;
            transition: transform 0.4s ease;
            cursor: pointer;
        }

        .imagen-principal:active {
            transform: scale(1.05);
        }

        /* Navegación inferior con botones */
        .nav-inferior {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        .btn-nav {
            display: inline-block;
            padding: 12px 35px;
            background-color: transparent;
            color: #1D293D;
            border: 2px solid #1D293D;
            text-decoration: none;
            font-size: 18px;
            border-radius: 30px; /* Forma redondeada para los botones */
            transition: all 0.3s ease;
        }

        .btn-nav:hover {
            background-color: #1D293D;
            color: #DFF2FE;
            transform: translateY(-3px); /* Pequeña animación al pasar el mouse */
        }

        /* Ajuste para móviles */
        @media (max-width: 600px) {
            h1 { font-size: 50px; }
            .imagen-principal { width: 90%; }
            .nav-inferior { flex-direction: column; align-items: center; }
        }
    </style>
</head>
