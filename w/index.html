<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Navbar Horizontal</title>

<style>
body {
  background-image:'img/pulpo fondo.jpg
  margin: 0;
  font-family: Arial, sans-serif;
}

.navbar {
  background-color: #333;
  
  overflow: hidden;
}

.navbar a {
  float: left;
  color: white;
  text-align: center;
  padding: 14px 20px;
  text-decoration: none;
}

.navbar a:hover {
  background-color: red;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="#">Inicio</a>
  <a href="#">Proyectos</a>
  <a href="#">Contacto</a>
</div>

</body>
</html>

    

</body>

</html>
