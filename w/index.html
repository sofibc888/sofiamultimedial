<!DOCTYPE html>
<!-- Indica que el documento usa un lenguaje HTML5 que se utiliza para crear paginas web-->

<html lang="es">
<!-- Idioma del contenido -->

<head>
    <meta charset="UTF-8">
    <!-- hace que el codigo Permita mostrar correctamente tildes y caracteres especiales como: !@#$-->

    <title>Sofia Becerra Forero</title>
    <!-- Título que aparece en la pestaña del navegador -->

      <!-- En el stlye se guardan todos los estilos -->
    <style>  
       
        /* En el Body se guardan los Estilos generales de la página */
        body {
            background-image: url(img/pulpofondo.jpg); /* Imagen del fondo */
            margin: 0; /* Elimina márgenes por defecto */
            font-family: Arial, sans-serif; /* Tipo de letra */
        }

        /* Contenedor de la barra de navegación */
        .navbar {
            background-color: transparent; /* background-color es el Color de fondo del navbar (en este caso es transparente) */
            overflow: hidden; /* Evita desbordes de los elementos internos (texto) hacia los lados  */
            
        }

        /* Estilo de los enlaces dentro del navbar */
        .navbar a {
            float: left; /* Hace que los links se alineen horizontalmente */
            color: white; /* Color del texto */
            text-align: center;
            padding: 14px 20px; /* Espaciado interno */
            text-decoration: none; /* Quita el subrayado */
        }

        /* Efecto al pasar el mouse */
        .navbar a:hover {
            background-color: red; /* Cambia el fondo a rojo */
        }
    </style>
</head>

<body>

    <!-- Barra de navegación -->
    <nav class="navbar">
         <!--El texto en el navbar -->
        Sofia Becerra Forero
        <!-- Enlace a página de Obras -->
        <a href="Obras.html">Obras</a>
        <!-- Enlace a página de Contactos -->
        <a href="Contactos.html">Contactos</a>
        
    </nav>

</body>
</html>
