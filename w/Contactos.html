

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia Becerra - Contactos</title>

    <style>
        /* ================================================
           ESTILOS GENERALES - RESET Y BASE
           ================================================ */
        
        /* Elimina márgenes y paddings por defecto */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fondo con gradiente suave y elegante */
        body {
            background: linear-gradient(135deg, #DFF2FE 0%, #FFFFFF 100%);
            /* Gradiente diagonal de celeste suave a blanco */
            color: #1D293D;
            min-height: 100vh;
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px 20px;
        }

        /* ================================================
           BOTONES DE NAVEGACIÓN (esquina superior derecha)
           ================================================ */
        
        /* Contenedor de los botones en esquina */
        .nav {
            position: fixed;
            top: 25px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        /* Estilo de cada enlace (botón cuadrado) */
        .nav a {
            display: block;
            padding: 10px 25px;
            background-color: transparent;
            color: #1D293D;
            border: 2px solid #1D293D;
            text-decoration: none;
            font-family: "Times New Roman", Times, serif;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
            /* Esquinas CUADRADAS */
            border-radius: 0px;
        }

        /* Efecto al pasar el mouse */
        .nav a:hover {
            background-color: #1D293D;
            color: #FFFFFF;
            transform: translateX(-5px); /* Se mueve ligeramente a la izquierda */
        }

        /* ================================================
           CONTENEDOR PRINCIPAL (tarjeta de contactos)
           ================================================ */
        
        /* Tarjeta blanca que contiene toda la información */
        .tarjeta-contactos {
            background-color: #FFFFFF;
            max-width: 550px;
            width: 100%;
            padding: 50px 40px;
            /* Esquinas CUADRADAS */
            border-radius: 0px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        /* Efecto sutil al pasar el mouse sobre la tarjeta */
        .tarjeta-contactos:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        /* ================================================
           TÍTULO "CONTACTOS"
           ================================================ */
        
        h1 {
            font-size: 65px;
            color: #1D293D;
            margin-bottom: 15px;
            font-family: "Times New Roman", Times, serif;
            font-weight: normal;
            letter-spacing: 3px;
            position: relative;
            display: inline-block;
        }

        /* Línea decorativa debajo del título */
        h1::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background-color: #1D293D;
        }

        /* ================================================
           INFORMACIÓN DE CONTACTO
           ================================================ */
        
        .info-contacto {
            margin-top: 40px;
            text-align: left;
        }

        /* Cada ítem de contacto */
        .contacto-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 15px 20px;
            background-color: #F8FBFE;
            transition: all 0.3s ease;
            border-left: 3px solid #1D293D;
        }

        /* Efecto al pasar el mouse sobre cada contacto */
        .contacto-item:hover {
            background-color: #DFF2FE;
            transform: translateX(8px);
        }

        /* Iconos (usando símbolos simples pero elegantes) */
        .icono {
            font-size: 32px;
            min-width: 50px;
            text-align: center;
        }

        /* Texto del contacto */
        .contacto-texto {
            flex: 1;
        }

        /* Etiqueta (tipo de contacto) */
        .contacto-etiqueta {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #5A6E8A;
            margin-bottom: 5px;
        }

        /* Valor del contacto (mail, instagram, teléfono) */
        .contacto-valor {
            font-size: 18px;
            font-family: "Times New Roman", Times, serif;
            color: #1D293D;
            text-decoration: none;
            word-break: break-all;
        }

        /* Enlace dentro del contacto (para mail y web) */
        .contacto-valor a {
            text-decoration: none;
            color: #1D293D;
            transition: color 0.3s ease;
        }

        .contacto-valor a:hover {
            color: #000000;
            text-decoration: underline;
        }

        /* ================================================
           DECORACIÓN ADICIONAL (líneas sutiles)
           ================================================ */
        
        /* Línea decorativa arriba de la tarjeta */
        .decoracion-superior {
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #1D293D, transparent);
            margin: 0 auto 30px auto;
        }

        /* ================================================
           RESPONSIVE (para pantallas pequeñas)
           ================================================ */
        
        @media (max-width: 768px) {
            .tarjeta-contactos {
                padding: 35px 25px;
                margin-top: 80px; /* Espacio para que no choque con los botones */
            }
            
            h1 {
                font-size: 50px;
            }
            
            .contacto-item {
                gap: 15px;
                padding: 12px 15px;
            }
            
            .icono {
                font-size: 28px;
                min-width: 40px;
            }
            
            .contacto-valor {
                font-size: 15px;
            }
            
            .nav {
                top: 15px;
                right: 20px;
                gap: 8px;
            }
            
            .nav a {
                padding: 8px 20px;
                font-size: 14px;
            }
        }

        /* Para celulares muy pequeños */
        @media (max-width: 480px) {
            .tarjeta-contactos {
                padding: 25px 20px;
            }
            
            h1 {
                font-size: 40px;
            }
            
            .contacto-item {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            
            .contacto-texto {
                text-align: center;
            }
            
            .nav a {
                padding: 6px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <!-- ================================================
       BOTONES DE NAVEGACIÓN (esquina superior derecha)
       ================================================ -->
    <div class="nav">
        <a href="Obras.html">Obras</a>
        <a href="index.html">Página principal</a>
    
    </div>

    <!-- ================================================
       TARJETA PRINCIPAL DE CONTACTOS
       ================================================ -->
    <div class="tarjeta-contactos">
        
        <!-- Línea decorativa superior -->
        <div class="decoracion-superior"></div>
        
        <!-- Título -->
        <h1>CONTACTOS</h1>
        
        <!-- Información de contacto -->
        <div class="info-contacto">
            
            <!-- Email -->
            <div class="contacto-item">
                <div class="icono">✉️</div>
                <div class="contacto-texto">
                    <div class="contacto-etiqueta">Email</div>
                    <div class="contacto-valor">
                        <a href="8888888888">88888888888</a>
                    </div>
                </div>
            </div>
            
            <!-- Instagram -->
            <div class="contacto-item">
                <div class="icono">📷</div>
                <div class="contacto-texto">
                    <div class="contacto-etiqueta">Instagram</div>
                    <div class="contacto-valor">
                        <a href="https://www.instagram.com/luz_degrillo" target="_blank">@luz_degrillo</a>
                    </div>
                </div>
            </div>
            
            <!-- Teléfono -->
            <div class="contacto-item">
                <div class="icono">📞</div>
                <div class="contacto-texto">
                    <div class="contacto-etiqueta">Teléfono</div>
                    <div class="contacto-valor">+888888888</div>
                </div>
            </div>
            
        </div>
    </div>

</body>

</html>
