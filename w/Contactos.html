
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia Becerra - Contactos</title>

    <style>
        /* ================================================
           ESTILOS GENERALES - RESET Y BASE
           ================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #DFF2FE 0%, #FFFFFF 100%);
            color: #1D293D;
            min-height: 100vh;
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative; /* Necesario para posicionar el fondo */
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* ================================================
           IMAGEN DE FONDO (CON MARGEN Y TRANSPARENCIA)
           ================================================ */
        body::before {
            content: "";
            position: fixed; 
            /* Margen desde los bordes del navegador */
            top: 40px;
            bottom: 40px;
            left: 40px;
            right: 40px;
            
            /* Ruta de tu imagen */
            background-image: url("IMG_fondocontacto.jpg"; 
            background-size: cover;
            background-position: center;
            
            /* Nivel de transparencia (0.1 a 1) */
            opacity: 0.3; 
            
            /* Se coloca detrás del contenido */
            z-index: -1; 
            pointer-events: none;
            border-radius: 0px; /* Manteniendo la estética cuadrada */
        }

        /* ================================================
           BOTONES DE NAVEGACIÓN
           ================================================ */
        .nav {
            position: fixed;
            top: 25px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .nav a {
            display: block;
            padding: 10px 25px;
            background-color: white; /* Fondo blanco para resaltar sobre la imagen */
            color: #1D293D;
            border: 2px solid #1D293D;
            text-decoration: none;
            font-family: "Times New Roman", Times, serif;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
            border-radius: 0px;
        }

        .nav a:hover {
            background-color: #1D293D;
            color: #FFFFFF;
            transform: translateX(-5px);
        }

        /* ================================================
           CONTENEDOR PRINCIPAL (TARJETA TRASLÚCIDA)
           ================================================ */
        .tarjeta-contactos {
            /* Blanco con 90% de opacidad para dejar ver sutilmente el fondo */
            background-color: rgba(255, 255, 255, 0.9); 
            max-width: 550px;
            width: 100%;
            padding: 50px 40px;
            border-radius: 0px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid rgba(29, 41, 61, 0.1);
        }

        .tarjeta-contactos:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        h1 {
            font-size: 65px;
            color: #1D293D;
            margin-bottom: 15px;
            font-family: "Times New Roman", Times, serif;
            font-weight: normal;
            letter-spacing: 3px;
            position: relative;
            display: inline-block;
        }

        h1::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background-color: #1D293D;
        }

        .info-contacto {
            margin-top: 40px;
            text-align: left;
        }

        .contacto-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 15px 20px;
            background-color: rgba(248, 251, 254, 0.8);
            transition: all 0.3s ease;
            border-left: 3px solid #1D293D;
        }

        .contacto-item:hover {
            background-color: #DFF2FE;
            transform: translateX(8px);
        }

        .icono {
            font-size: 32px;
            min-width: 50px;
            text-align: center;
        }

        .contacto-texto {
            flex: 1;
        }

        .contacto-etiqueta {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #5A6E8A;
            margin-bottom: 5px;
        }

        .contacto-valor {
            font-size: 18px;
            font-family: "Times New Roman", Times, serif;
            color: #1D293D;
            text-decoration: none;
            word-break: break-all;
        }

        .contacto-valor a {
            text-decoration: none;
            color: #1D293D;
        }

        .decoracion-superior {
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #1D293D, transparent);
            margin: 0 auto 30px auto;
        }

        /* ================================================
           RESPONSIVE
           ================================================ */
        @media (max-width: 768px) {
            body::before {
                top: 15px; bottom: 15px; left: 15px; right: 15px;
            }
            .tarjeta-contactos {
                padding: 35px 25px;
                margin-top: 80px;
            }
            h1 { font-size: 50px; }
        }
    </style>
</head>

<body>

    <div class="nav">
        <a href="Obras.html">Obras</a>
        <a href="index.html">Página principal</a>
    </div>

    <div class="tarjeta-contactos">
        <div class="decoracion-superior"></div>
        
        <h1>CONTACTOS</h1>
        
        <div class="info-contacto">
            <div class="contacto-item">
                <div class="icono">✉️</div>
                <div class="contacto-texto">
                    <div class="contacto-etiqueta">Email</div>
                    <div class="contacto-valor">
                        <a href="mailto:tuemail@ejemplo.com">tuemail@ejemplo.com</a>
                    </div>
                </div>
            </div>
            
            <div class="contacto-item">
                <div class="icono">📷</div>
                <div class="contacto-texto">
                    <div class="contacto-etiqueta">Instagram</div>
                    <div class="contacto-valor">
                        <a href="https://www.instagram.com/luz_degrillo" target="_blank">@luz_degrillo</a>
                    </div>
                </div>
            </div>
            
            <div class="contacto-item">
                <div class="icono">📞</div>
                <div class="contacto-texto">
                    <div class="contacto-etiqueta">Teléfono</div>
                    <div class="contacto-valor">+555555555</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
