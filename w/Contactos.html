
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia Becerra - Contactos</title>

    <style>
        /* RESET Y BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #DFF2FE 0%, #FFFFFF 100%);
            color: #1D293D;
            min-height: 100vh;
            font-family: "Times New Roman", Times, serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* NAVEGACIÓN */
        .nav {
            position: fixed;
            top: 25px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .nav a {
            display: block;
            padding: 10px 25px;
            border: 2px solid #1D293D;
            text-decoration: none;
            color: #1D293D;
            font-weight: bold;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
        }

        .nav a:hover {
            background-color: #1D293D;
            color: #FFFFFF;
            transform: translateX(-5px);
        }

        /* CONTENEDOR DEL MARCO CON IMAGEN */
        .contenedor-marco {
            position: relative;
            max-width: 800px; /* Tamaño del recuadro con imagen */
            width: 100%;
            padding: 60px; /* Margen interno para que la tarjeta no toque los bordes de la imagen */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(29, 41, 61, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* Capa de la imagen con transparencia */
        .contenedor-marco::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            /* REEMPLAZA 'IMG_2064.jpg' por la ruta de tu archivo */
            background-image: url('IMG_2064.jpg'); 
            background-size: cover;
            background-position: center;
            opacity: 0.3; /* Aquí controlas qué tan transparente es la imagen */
            z-index: -1;
        }

        /* TARJETA DE CONTACTOS (La blanca central) */
        .tarjeta-contactos {
            background-color: #FFFFFF;
            max-width: 500px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 45px;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: normal;
        }

        .decoracion-superior {
            width: 100px;
            height: 2px;
            background: #1D293D;
            margin: 0 auto 20px auto;
        }

        /* ITEMS DE CONTACTO */
        .info-contacto {
            margin-top: 30px;
            text-align: left;
        }

        .contacto-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 12px;
            background-color: #F8FBFE;
            border-left: 3px solid #1D293D;
            transition: 0.3s;
        }

        .contacto-item:hover {
            background-color: #DFF2FE;
            transform: translateX(5px);
        }

        .icono { font-size: 24px; min-width: 40px; text-align: center; }
        .contacto-etiqueta { font-size: 12px; font-weight: bold; color: #5A6E8A; text-transform: uppercase; }
        .contacto-valor { font-size: 16px; word-break: break-all; }
        .contacto-valor a { text-decoration: none; color: #1D293D; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .contenedor-marco { padding: 30px; }
            h1 { font-size: 35px; }
        }
    </style>
</head>

<body>

    <nav class="nav">
        <a href="Obras.html">Obras</a>
        <a href="index.html">Página principal</a>
    </nav>

    <div class="contenedor-marco">
        
        <div class="tarjeta-contactos">
            <div class="decoracion-superior"></div>
            <h1>CONTACTOS</h1>
            
            <div class="info-contacto">
                <div class="contacto-item">
                    <div class="icono">✉️</div>
                    <div class="contacto-texto">
                        <div class="contacto-etiqueta">Email</div>
                        <div class="contacto-valor"><a href="mailto:sbecerraforero@uft.edu">sbecerraforero@uft.edu</a></div>
                    </div>
                </div>

                <div class="contacto-item">
                    <div class="icono">📷</div>
                    <div class="contacto-texto">
                        <div class="contacto-etiqueta">Instagram</div>
                        <div class="contacto-valor"><a href="https://www.instagram.com/luz_degrillo" target="_blank">@luz_degrillo</a></div>
                    </div>
                </div>

                <div class="contacto-item">
                    <div class="icono">📞</div>
                    <div class="contacto-texto">
                        <div class="contacto-etiqueta">Teléfono</div>
                        <div class="contacto-valor">+569 6534 9678</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
