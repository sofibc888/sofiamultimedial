<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia Becerra - Obras</title>

    <style>
        /* ================================================
           ESTILOS GENERALES
           ================================================ */
        
        /* Elimina espacios por defecto del navegador */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fondo BLANCO y centrado de todo el contenido */
        body {
            background-color: #FFFFFF; /* Fondo blanco puro */
            font-family: "Times New Roman", Times, serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* ================================================
           BOTÓN CONTACTOS (esquina superior derecha)
           ================================================ */
        .contactos {
            position: fixed; /* Fijo en pantalla */
            top: 20px;
            right: 30px;
            z-index: 100;
        }

        .contactos a {
            text-decoration: none;
            color: #1D293D;
            font-size: 18px;
        }

        .contactos a:hover {
            text-decoration: underline;
        }

        /* ================================================
           TÍTULO "Obras"
           ================================================ */
        h1 {
            font-size: 70px;
            margin-bottom: 50px;
            color: #1D293D;
            text-align: center;
        }

        /* ================================================
           CARRUSEL
           ================================================ */
        
        /* Contenedor principal del carrusel */
        .carrusel {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Área donde se ven las imágenes */
        .ventana {
            overflow: hidden; /* Oculta lo que no se ve */
        }

        /* Fila horizontal de todas las imágenes */
        .imagenes {
            display: flex;
            transition: transform 0.5s ease; /* Movimiento suave */
        }

        /* Cada imagen ocupa todo el ancho */
        .imagenes img {
            width: 100%;
            flex-shrink: 0; /* No se encoge */
            height: auto;
            max-height: 550px;
            object-fit: contain; /* Imagen completa sin recortes */
            background-color: #FFFFFF;
            /* Esquinas PUNTIAGUDAS (sin redondeo) */
            border-radius: 0px;
        }

        /* ================================================
           FLECHAS DEL CARRUSEL
           ================================================ */
        
        /* Estilo de ambas flechas */
        button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(29, 41, 61, 0.8);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%; /* Solo las flechas son redondas */
            font-size: 25px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
        }

        button:hover {
            background-color: rgba(29, 41, 61, 1);
            transform: translateY(-50%) scale(1.1);
        }

        /* Flecha izquierda */
        .anterior {
            left: -20px;
        }

        /* Flecha derecha */
        .siguiente {
            right: -20px;
        }

        /* ================================================
           PUNTOS INDICADORES (abajo del carrusel)
           ================================================ */
        .puntos {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
            margin-bottom: 40px;
        }

        .punto {
            width: 12px;
            height: 12px;
            background-color: #CCCCCC;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        .punto.activo {
            background-color: #1D293D;
            transform: scale(1.2);
        }

        /* ================================================
           BOTÓN VOLVER
           ================================================ */
        .volver {
            display: inline-block;
            padding: 15px 40px;
            background-color: transparent;
            color: #1D293D;
            border: 2px solid #1D293D;
            text-decoration: none;
            font-size: 20px;
            border-radius: 50px;
            transition: 0.3s;
            font-weight: bold;
        }

        .volver:hover {
            background-color: #1D293D;
            color: white;
        }

        /* ================================================
           RESPONSIVE (celulares)
           ================================================ */
        @media (max-width: 768px) {
            h1 { font-size: 45px; }
            .carrusel { max-width: 95%; }
            button { width: 35px; height: 35px; font-size: 18px; }
            .anterior { left: -15px; }
            .siguiente { right: -15px; }
            .volver { padding: 12px 30px; font-size: 16px; }
        }
    </style>
</head>

<body>

    <!-- Enlace a Contactos -->
    <div class="contactos">
        <a href="Contactos.html">Contactos</a>
    </div>

    <!-- Título -->
    <h1>Obras</h1>

    <!-- CARRUSEL -->
    <div class="carrusel">
        <!-- Flecha izquierda -->
        <button class="anterior" id="btnAnterior">‹</button>

        <!-- Ventana donde se ven las imágenes -->
        <div class="ventana">
            <div class="imagenes" id="carruselImagenes">
                <img src="img/IMG_3769.jpg" alt="Obra 1">
                <img src="img/IMG_9081.jpg" alt="Obra 2">
                <img src="img/IMG_0402.jpg" alt="Obra 3">
                <img src="img/IMG_2254.jpg" alt="Obra 4">
                <img src="img/72ec5075-961b-42f0-94f3-7ac90a986b6b.jpg" alt="Obra 5">
                <img src="img/IMG_1171.jpg" alt="Obra 6">
            </div>
        </div>

        <!-- Flecha derecha -->
        <button class="siguiente" id="btnSiguiente">›</button>
    </div>

    <!-- Puntos indicadores -->
    <div class="puntos" id="puntos"></div>

    <!-- Botón volver -->
    <a href="index.html" class="volver">Volver al menú principal</a>

    <!-- ================================================
           JAVASCRIPT (lógica del carrusel)
           ================================================ -->
    <script>
        // 1. Seleccionar todos los elementos que necesitamos
        const imagenes = document.getElementById('carruselImagenes'); // Contenedor de imágenes
        const total = document.querySelectorAll('.imagenes img').length; // Cantidad de imágenes (6)
        let indice = 0; // Empieza en la imagen 0 (la primera)

        // 2. Botones
        const anterior = document.getElementById('btnAnterior');
        const siguiente = document.getElementById('btnSiguiente');

        // 3. Función para mover el carrusel
        function moverCarrusel() {
            // Mueve las imágenes: si índice=0 → 0%, índice=1 → -100%, índice=2 → -200%
            imagenes.style.transform = `translateX(-${indice * 100}%)`;
            
            // Actualizar los puntos (para que se vea cuál está activo)
            const puntos = document.querySelectorAll('.punto');
            puntos.forEach((punto, i) => {
                if (i === indice) {
                    punto.classList.add('activo');
                } else {
                    punto.classList.remove('activo');
                }
            });
        }

        // 4. Función para ir a la SIGUIENTE imagen
        function siguienteImagen() {
            if (indice === total - 1) {
                indice = 0; // Si es la última, vuelve a la primera
            } else {
                indice++; // Sino, avanza
            }
            moverCarrusel();
        }

        // 5. Función para ir a la ANTERIOR imagen
        function anteriorImagen() {
            if (indice === 0) {
                indice = total - 1; // Si es la primera, va a la última
            } else {
                indice--; // Sino, retrocede
            }
            moverCarrusel();
        }

        // 6. Función para ir a una imagen ESPECÍFICA (al hacer clic en un punto)
        function irAImagen(posicion) {
            indice = posicion;
            moverCarrusel();
        }

        // 7. Crear los puntos indicadores automáticamente
        function crearPuntos() {
            const contenedorPuntos = document.getElementById('puntos');
            contenedorPuntos.innerHTML = ''; // Limpiar por si acaso
            
            for (let i = 0; i < total; i++) {
                const punto = document.createElement('div');
                punto.classList.add('punto');
                if (i === 0) punto.classList.add('activo'); // El primero empieza activo
                punto.addEventListener('click', () => irAImagen(i));
                contenedorPuntos.appendChild(punto);
            }
        }

        // 8. Conectar los botones a las funciones
        siguiente.addEventListener('click', siguienteImagen);
        anterior.addEventListener('click', anteriorImagen);

        // 9. Navegación con TECLADO (flechas ← y →)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') siguienteImagen();
            if (e.key === 'ArrowLeft') anteriorImagen();
        });

        // 10. Iniciar todo cuando cargue la página
        crearPuntos();
    </script>

</body>

</html>
