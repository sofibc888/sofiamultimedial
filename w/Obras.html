<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia Becerra - Obras</title>

    <style>
        /* ================================================
           ESTILOS GENERALES
           ================================================ */
        
        /* Elimina espacios por defecto del navegador */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fondo BLANCO y centrado de todo el contenido */
        body {
            background-color: #FFFFFF; /* Fondo blanco puro */
            font-family: "Times New Roman", Times, serif; /* Fuente Times New Roman */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* ================================================
           BOTONES CUADRADOS EN LA ESQUINA SUPERIOR
           ================================================ */
        
        /* Contenedor de los dos botones en la esquina superior derecha */
        .botones-esquina {
            position: fixed; /* Fijo en la pantalla (no se mueve al hacer scroll) */
            top: 20px;      /* Distancia desde arriba */
            right: 20px;    /* Distancia desde la derecha */
            display: flex;  /* Pone los botones uno al lado del otro */
            gap: 15px;      /* Espacio entre los dos botones */
            z-index: 100;   /* Asegura que estén por encima del carrusel */
        }

        /* Estilo de los botones cuadrados (mismo formato que "volver al menú principal") */
        .boton-cuadrado {
            display: inline-block;
            padding: 12px 25px;      /* Relleno interno */
            background-color: transparent; /* Fondo transparente */
            color: #1D293D;           /* Color del texto azul oscuro */
            border: 2px solid #1D293D; /* Borde sólido del mismo color */
            text-decoration: none;     /* Elimina subrayado */
            font-family: "Times New Roman", Times, serif; /* Times New Roman */
            font-size: 16px;           /* Tamaño de letra */
            font-weight: bold;         /* Negrita */
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease; /* Transición suave */
            /* Esquinas CUADRADAS (sin redondeo) */
            border-radius: 0px;
        }

        /* Efecto al pasar el mouse por encima del botón cuadrado */
        .boton-cuadrado:hover {
            background-color: #1D293D; /* Fondo se vuelve oscuro */
            color: #FFFFFF;            /* Texto se vuelve blanco */
            transform: translateY(-2px); /* Se levanta ligeramente */
        }

        /* ================================================
           TÍTULO "Obras"
           ================================================ */
        h1 {
            font-size: 80px;           /* Título más grande */
            margin-bottom: 60px;       /* Margen inferior */
            color: #1D293D;
            text-align: center;
            font-family: "Times New Roman", Times, serif; /* Times New Roman */
            font-weight: normal;
        }

        /* ================================================
           CARRUSEL MÁS GRANDE (ocupa más espacio)
           ================================================ */
        
        /* Contenedor principal del carrusel - AHORA MÁS GRANDE */
        .carrusel {
            position: relative;
            width: 100%;
            max-width: 1200px;    /* Aumentado de 900px a 1200px (más ancho) */
            margin: 0 auto;
        }

        /* Área donde se ven las imágenes */
        .ventana {
            overflow: hidden; /* Oculta lo que no se ve */
            /* Esquinas PUNTIAGUDAS */
            border-radius: 0px;
        }

        /* Fila horizontal de todas las imágenes */
        .imagenes {
            display: flex;
            transition: transform 0.5s ease; /* Movimiento suave */
        }

        /* Cada imagen ocupa todo el ancho */
        .imagenes img {
            width: 100%;
            flex-shrink: 0; /* No se encoge */
            height: auto;
            max-height: 650px; /* Aumentado de 550px a 650px (más alto) */
            object-fit: contain; /* Imagen completa sin recortes */
            background-color: #FFFFFF;
            /* Esquinas PUNTIAGUDAS (sin redondeo) */
            border-radius: 0px;
        }

        /* ================================================
           FLECHAS DEL CARRUSEL (más grandes también)
           ================================================ */
        
        /* Estilo de ambas flechas */
        button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(29, 41, 61, 0.8);
            color: white;
            border: none;
            width: 55px;         /* Flechas más grandes */
            height: 55px;        /* Flechas más grandes */
            border-radius: 0px;  /* Flechas CUADRADAS para que coincidan con los botones */
            font-size: 30px;     /* Icono más grande */
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background-color: rgba(29, 41, 61, 1);
            transform: translateY(-50%) scale(1.05);
        }

        /* Flecha izquierda */
        .anterior {
            left: -25px; /* Más separada hacia afuera */
        }

        /* Flecha derecha */
        .siguiente {
            right: -25px; /* Más separada hacia afuera */
        }

        /* ================================================
           PUNTOS INDICADORES (abajo del carrusel)
           ================================================ */
        .puntos {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 35px;
            margin-bottom: 50px;
        }

        .punto {
            width: 14px;
            height: 14px;
            background-color: #CCCCCC;
            border-radius: 0px; /* Puntos CUADRADOS para mantener coherencia */
            cursor: pointer;
            transition: 0.3s;
        }

        .punto.activo {
            background-color: #1D293D;
            transform: scale(1.2);
        }

        /* ================================================
           BOTÓN VOLVER AL MENÚ PRINCIPAL (abajo, centrado)
           ================================================ */
        .volver {
            display: inline-block;
            padding: 15px 40px;
            background-color: transparent;
            color: #1D293D;
            border: 2px solid #1D293D;
            text-decoration: none;
            font-family: "Times New Roman", Times, serif;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            /* Esquinas CUADRADAS */
            border-radius: 0px;
        }

        .volver:hover {
            background-color: #1D293D;
            color: white;
            transform: translateY(-2px);
        }

        /* ================================================
           RESPONSIVE (celulares y tablets)
           ================================================ */
        
        /* Tablets y celulares grandes */
        @media (max-width: 768px) {
            h1 { 
                font-size: 55px; 
                margin-bottom: 40px;
            }
            
            .carrusel { 
                max-width: 90%; /* En móviles ocupa el 90% del ancho */
            }
            
            .imagenes img {
                max-height: 450px; /* Altura más pequeña en móviles */
            }
            
            button { 
                width: 40px; 
                height: 40px; 
                font-size: 22px; 
            }
            
            .anterior { 
                left: -15px; 
            }
            
            .siguiente { 
                right: -15px; 
            }
            
            .boton-cuadrado {
                padding: 8px 18px;
                font-size: 14px;
            }
            
            .volver { 
                padding: 12px 30px; 
                font-size: 18px; 
            }
            
            .puntos {
                gap: 10px;
            }
            
            .punto {
                width: 10px;
                height: 10px;
            }
        }

        /* Celulares muy pequeños */
        @media (max-width: 480px) {
            h1 {
                font-size: 45px;
            }
            
            button {
                width: 35px;
                height: 35px;
                font-size: 18px;
            }
            
            .anterior {
                left: -10px;
            }
            
            .siguiente {
                right: -10px;
            }
            
            .botones-esquina {
                top: 10px;
                right: 10px;
                gap: 8px;
            }
            
            .boton-cuadrado {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <!-- ================================================
       BOTONES CUADRADOS EN LA ESQUINA SUPERIOR DERECHA
       ================================================ -->
    <div class="botones-esquina">
        <a href="Contactos.html" class="boton-cuadrado">Contactos</a>
        <a href="index.html" class="boton-cuadrado">Menú</a>
    </div>

    <!-- Título -->
    <h1>Obras</h1>

    <!-- ================================================
       CARRUSEL (más grande)
       ================================================ -->
    <div class="carrusel">
        <!-- Flecha izquierda -->
        <button class="anterior" id="btnAnterior">‹</button>

        <!-- Ventana donde se ven las imágenes -->
        <div class="ventana">
            <div class="imagenes" id="carruselImagenes">
                <img src="img/IMG_3769.jpg" alt="Obra 1">
                <img src="img/IMG_9081.jpg" alt="Obra 2">
                <img src="img/IMG_0402.jpg" alt="Obra 3">
                <img src="img/IMG_2254.jpg" alt="Obra 4">
                <img src="img/72ec5075-961b-42f0-94f3-7ac90a986b6b.jpg" alt="Obra 5">
                <img src="img/IMG_1171.jpg" alt="Obra 6">
            </div>
        </div>

        <!-- Flecha derecha -->
        <button class="siguiente" id="btnSiguiente">›</button>
    </div>

    <!-- Puntos indicadores -->
    <div class="puntos" id="puntos"></div>

    <!-- Botón volver al menú principal (abajo, centrado) -->
    <a href="index.html" class="volver">Volver al menú principal</a>

    <!-- ================================================
       JAVASCRIPT (lógica del carrusel)
       ================================================ -->
    <script>
        // ================================================
        // DECLARACIÓN DE VARIABLES
        // ================================================
        
        // Selecciona el contenedor que tiene todas las imágenes en fila
        const imagenes = document.getElementById('carruselImagenes');
        
        // Calcula cuántas imágenes hay (6 en total)
        const total = document.querySelectorAll('.imagenes img').length;
        
        // Variable que guarda en qué imagen estamos (empieza en 0 = primera)
        let indice = 0;

        // Selecciona los botones de las flechas
        const anterior = document.getElementById('btnAnterior');
        const siguiente = document.getElementById('btnSiguiente');

        // ================================================
        // FUNCIÓN: Actualizar la posición del carrusel
        // ================================================
        function moverCarrusel() {
            // Mueve el carrusel: si índice=0 → 0%, índice=1 → -100%, índice=2 → -200%
            imagenes.style.transform = `translateX(-${indice * 100}%)`;
            
            // Actualizar los puntos (para que se vea cuál está activo)
            const puntos = document.querySelectorAll('.punto');
            puntos.forEach((punto, i) => {
                if (i === indice) {
                    punto.classList.add('activo'); // Punto activo se pone oscuro
                } else {
                    punto.classList.remove('activo'); // Puntos inactivos se ponen grises
                }
            });
        }

        // ================================================
        // FUNCIÓN: Ir a la SIGUIENTE imagen
        // ================================================
        function siguienteImagen() {
            if (indice === total - 1) {
                indice = 0; // Si es la última imagen, vuelve a la primera (efecto circular)
            } else {
                indice++; // Sino, avanza a la siguiente
            }
            moverCarrusel();
        }

        // ================================================
        // FUNCIÓN: Ir a la ANTERIOR imagen
        // ================================================
        function anteriorImagen() {
            if (indice === 0) {
                indice = total - 1; // Si es la primera imagen, va a la última (efecto circular)
            } else {
                indice--; // Sino, retrocede a la anterior
            }
            moverCarrusel();
        }

        // ================================================
        // FUNCIÓN: Ir a una imagen ESPECÍFICA (al hacer clic en un punto)
        // ================================================
        function irAImagen(posicion) {
            indice = posicion;
            moverCarrusel();
        }

        // ================================================
        // FUNCIÓN: Crear los puntos indicadores automáticamente
        // ================================================
        function crearPuntos() {
            const contenedorPuntos = document.getElementById('puntos');
            contenedorPuntos.innerHTML = ''; // Limpiar el contenedor por si acaso
            
            // Crear un punto por cada imagen
            for (let i = 0; i < total; i++) {
                const punto = document.createElement('div');
                punto.classList.add('punto');
                if (i === 0) punto.classList.add('activo'); // El primer punto empieza activo
                punto.addEventListener('click', () => irAImagen(i)); // Al hacer clic, va a esa imagen
                contenedorPuntos.appendChild(punto);
            }
        }

        // ================================================
        // CONECTAR LOS BOTONES A LAS FUNCIONES
        // ================================================
        siguiente.addEventListener('click', siguienteImagen);
        anterior.addEventListener('click', anteriorImagen);

        // ================================================
        // NAVEGACIÓN CON TECLADO (flechas ← y →)
        // ================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                siguienteImagen(); // Flecha derecha: imagen siguiente
            }
            if (e.key === 'ArrowLeft') {
                anteriorImagen(); // Flecha izquierda: imagen anterior
            }
        });

        // ================================================
        // INICIAR TODO CUANDO CARGUE LA PÁGINA
        // ================================================
        crearPuntos();
    </script>

</body>

</html>
